name: Build Android APK (Expo EAS)

on:
  workflow_dispatch:
    inputs:
      eas_profile:
        description: "EAS build profile from rn/eas.json"
        required: true
        default: "apk"
  push:
    tags:
      - "apk-*"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rn
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: rn/package-lock.json

      - name: Install deps
        run: npm ci

      - name: EAS build (cloud)
        env:
          EAS_ACCESS_TOKEN: ${{ secrets.EAS_ACCESS_TOKEN }}
        run: npx eas-cli@latest build -p android --profile "${{ inputs.eas_profile || 'apk' }}" --non-interactive --wait

      - name: Download latest APK
        env:
          EAS_ACCESS_TOKEN: ${{ secrets.EAS_ACCESS_TOKEN }}
        run: npx eas-cli@latest build:download --platform android --latest --non-interactive --output ../habit-tracker.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: habit-tracker-android-apk
          path: habit-tracker.apk

      - name: Upload to GitHub Release (tag builds)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: habit-tracker.apk

